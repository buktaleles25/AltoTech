name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - claude/batch-watermark-app-ejrz9p
  workflow_dispatch:

# สิทธิ์ที่จำเป็นสำหรับ deploy ขึ้น GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# ให้ deploy ทีละครั้ง ไม่ทับกัน
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
